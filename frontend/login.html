<!DOCTYPE html>
<html lang="en">

<!-- Head -->

<head>
  <meta charset="UTF-8" />
  <title>Crossword Composer Login</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <style>
    input { font-size: 1rem !important; }
  </style>
</head>

<!-- Body -->
<body style="display:flex;justify-content:center;padding-top:80px">

  <!-- Login dialog -->
  <div class="w3-modal-content w3-card-4" style="width:30%">

    <!-- Heading -->
    <div class="w3-blue-gray w3-center">
      <h3 style="margin-top:0">Login</h3>
    </div>

    <!-- Login form -->
    <form id="lgnForm" class="w3-container">

      <!-- Username -->
      <div class="w3-section">
        <label><b>Username</b></label>
        <input
          id="lgnUsername"
          type="text"
          class="w3-input w3-border"
          autofocus
          placeholder="Enter username"
          name="username"
          required
        />
      </div>

      <!-- Password -->
      <div class="w3-section">
        <label><b>Password</b></label>
        <input
          id="lgnPassword"
          type="password"
          class="w3-input w3-border"
          placeholder="Enter password"
          name="password"
          required
        />
      </div>

      <!-- Submit button -->
      <div class="w3-section w3-center">
        <button type="submit" class="w3-button w3-border w3-round w3-gray" style="width:100px">Login</button>
      </div>

      <!-- Error message -->
      <div id="lgnError" class="w3-section w3-center w3-text-red" style="display:none">
        <span id="lgnErrmsg"></span>
      </div>

    </form>
  </div>

<script>
document.getElementById('lgnForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const username = document.getElementById('lgnUsername').value;
  const password = document.getElementById('lgnPassword').value;
  const errDiv = document.getElementById('lgnError');
  const errMsg = document.getElementById('lgnErrmsg');
  errDiv.style.display = 'none';

  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (resp.ok) {
      window.location.href = '/';
    } else {
      const data = await resp.json();
      errMsg.textContent = data.error || 'Login failed';
      errDiv.style.display = 'block';
    }
  } catch (err) {
    errMsg.textContent = 'Network error';
    errDiv.style.display = 'block';
  }
});
</script>

</body>

</html>
