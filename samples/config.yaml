# Crossword Composer configuration
#
# Copy this file to:
#   Linux/macOS: ~/.config/crossword/config.yaml
#   Windows: %APPDATA%\crossword\config.yaml

# host: IP address the server will bind to
host: 127.0.0.1

# port: TCP port the server will listen on
port: 5000

# dbfile: fully qualified path to the SQLite 3 database
dbfile: /path/to/crossword.db

# word_file: fully qualified path to the ASCII word list file
word_file: /path/to/words.txt

# log_level: one of CRITICAL, ERROR, WARNING, INFO, DEBUG, NOTSET
log_level: INFO

# How many milliseconds for the message line to remain visible
message_line_timeout_ms: 2000

# Theme color in RGB notation, like #FFFFF2
theme_color: "#154d71"

# NYTimes submission: author info printed on the grid page
author_name: Your Name
author_address: "123 Main St, City, ST 12345"
author_email: you@example.com
