<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossword Editor</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Crossword Editor</h1>
            <nav id="navbar">
                <button id="btn-new-grid">New Grid</button>
                <button id="btn-new-puzzle">New Puzzle</button>
                <span id="status-message"></span>
            </nav>
        </header>

        <main>
            <!-- Grid management section -->
            <section id="grid-section" style="display: none;">
                <h2>Grid Editor</h2>
                <div id="grid-editor"></div>
                <div id="grid-toolbar">
                    <button id="btn-rotate-grid">Rotate</button>
                    <button id="btn-undo-grid">Undo</button>
                    <button id="btn-redo-grid">Redo</button>
                    <button id="btn-delete-grid">Delete Grid</button>
                </div>
            </section>

            <!-- Puzzle editing section -->
            <section id="puzzle-section" style="display: none;">
                <h2>Puzzle Editor</h2>
                <div class="puzzle-layout">
                    <div id="puzzle-editor"></div>
                    <div id="word-editor">
                        <div id="word-clue-editor" style="display: none;">
                            <h3>Clue Editor</h3>
                            <input type="text" id="input-clue" placeholder="Enter clue...">
                            <button id="btn-save-clue">Save Clue</button>
                        </div>
                        <div id="word-suggestions">
                            <h3>Word Suggestions</h3>
                            <input type="text" id="input-pattern" placeholder="Pattern (e.g., ?HALE)">
                            <div id="suggestions-list"></div>
                        </div>
                    </div>
                </div>
                <div id="puzzle-toolbar">
                    <button id="btn-undo-puzzle">Undo</button>
                    <button id="btn-redo-puzzle">Redo</button>
                    <button id="btn-save-puzzle">Save Puzzle</button>
                    <button id="btn-delete-puzzle">Delete Puzzle</button>
                    <button id="btn-export-xml">Export XML</button>
                </div>
            </section>

            <!-- Grid/Puzzle list section -->
            <section id="list-section">
                <h2>My Projects</h2>
                <div class="list-layout">
                    <div id="grid-list">
                        <h3>Grids</h3>
                        <ul id="grids-list"></ul>
                    </div>
                    <div id="puzzle-list">
                        <h3>Puzzles</h3>
                        <ul id="puzzles-list"></ul>
                    </div>
                </div>
            </section>
        </main>

        <!-- Dialogs (modals) -->
        <div id="dialog-new-grid" class="dialog" style="display: none;">
            <div class="dialog-content">
                <h3>Create New Grid</h3>
                <label>Grid Name: <input type="text" id="input-grid-name" placeholder="e.g., Sunday Grid"></label>
                <label>Size: <input type="number" id="input-grid-size" value="15" min="1" max="25"></label>
                <button id="btn-confirm-new-grid">Create</button>
                <button id="btn-cancel-new-grid">Cancel</button>
            </div>
        </div>

        <div id="dialog-new-puzzle" class="dialog" style="display: none;">
            <div class="dialog-content">
                <h3>Create New Puzzle</h3>
                <label>Puzzle Name: <input type="text" id="input-puzzle-name" placeholder="e.g., Sunday Puzzle"></label>
                <label>Grid:
                    <select id="select-grid-for-puzzle">
                        <option value="">-- Select a grid --</option>
                    </select>
                </label>
                <button id="btn-confirm-new-puzzle">Create</button>
                <button id="btn-cancel-new-puzzle">Cancel</button>
            </div>
        </div>

        <div id="dialog-error" class="dialog dialog-error" style="display: none;">
            <div class="dialog-content">
                <h3>Error</h3>
                <p id="error-message"></p>
                <button id="btn-close-error">OK</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/js/api.js"></script>
    <script src="/static/js/state.js"></script>
    <script src="/static/js/grid-editor.js"></script>
    <script src="/static/js/puzzle-editor.js"></script>
    <script src="/static/js/word-editor.js"></script>
    <script src="/static/js/dialogs.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
