
<html>

<script>
// Global variables
let PUZZLE_CLICK_STATE = 0;
let CLICK_EVENT;
const BOXSIZE = 32;

function not_yet(fname) {
    alert(`${fname} is not yet implemented...`);
}
function showElement(id) {
    document.getElementById(id).style.display = "block";
}
function hideElement(id) {
    document.getElementById(id).style.display = "none";
}
function do_grid_new() {
    const title = "New grid";
    const label = "<b>Grid size:</b> <em>(a single odd positive integer)</em>";
    const value = "";
    const action = "javascript:validateNewGridFormAndSubmit()";
    const method = "";
    inputBox(title, label, value, action, method);
}
function do_grid_new_from_puzzle() {

}
function validateNewGridFormAndSubmit() {
    let n = document.forms["ib-form"]["ib-input"].value;
    if (isNaN(n)) {
        alert(n + " is not a number");
        return false;
    }
    n = Number(n);
    if (n % 2 == 0) {
        alert(n + " is not an odd number");
        return false;
    }
    if (n < 0) {
        alert(n + " is not a positive number");
        return false;
    }
    hideElement("ib");
    let url = "/grid-new";
    url += `?n=${n}`;
    window.location.href=url;
}
</script>
</head>

<body>

<script>
    function messageBox(title, prompt, ok) {
        document.getElementById("mb-title").innerHTML = title;
        document.getElementById("mb-prompt").innerHTML = prompt;
        document.getElementById("mb-ok").setAttribute("href", ok);
        document.getElementById("mb").style.display = "block";
    }
</script>
<div id="mb" class="w3-modal" style="display:none">
    <div class="w3-modal-content w3-card-4" style="width:30%">
        <div class="w3-blue-gray w3-center">
            <span class="w3-button w3-display-topright" onclick="hideElement('mb')">&times;</span>
            <h3 id="mb-title"></h3>
        </div>
        <div class="w3-container">
            <div class="w3-section">
                <span id="mb-prompt"></span>
            </div>
            <div class="w3-section w3-center">
                <!-- OK button -->
                <a class="w3-button w3-border w3-round w3-gray"
                   id="mb-ok"
                   href="#"
                   style="width:100px">OK</a>
                <!-- Cancel button -->
                <button class="w3-button w3-border w3-round w3-gray"
                        onclick="hideElement('mb')"
                        style="width:100px">Cancel</button>
            </div>
        </div>
    </div>
</div>
<script>
function inputBox(title, label, value, action, method) {
    document.getElementById("ib-title").innerHTML = title;
    document.getElementById("ib-label").innerHTML = label;
    document.getElementById("ib-input").value = value;
    document.getElementById("ib-form").setAttribute("action", action);
    if (method != "") {
        document.getElementById("ib-form").method = method;
    }
    document.getElementById("ib").style.display = "block";
}
function inputBoxSubmit() {
    alert("DEBUG: submit_function not specified");
}
</script>
<div id="ib" class="w3-modal" style="display:none">
    <div class="w3-modal-content w3-card-4" style="width:30%">
        <div class="w3-blue-gray w3-center">
            <span class="w3-button w3-display-topright" onclick="hideElement('ib')">&times;</span>
            <h3 id="ib-title"></h3>
        </div>
        <div class="w3-section">
            <span id="ib-prompt"></span>
        </div>
        <form id="ib-form" name="ib-form" class="w3-container">
            <div class="w3-section">
                <label id="ib-label"></label>
                <input type="text" id="ib-input" name="ib-input" value="" required></input>
                <div class="w3-section w3-center">
                    <!-- OK button -->
                    <button class="w3-button w3-border w3-round w3-gray"
                            id="ib-ok"
                            type="submit"
                            value="OK"
                            style="width:100px">OK</button>
                    <!-- Cancel button -->
                    <button class="w3-button w3-border w3-round w3-gray"
                            onclick="hideElement('ib')"
                            style="width:100px">Cancel</button>
                </div>
            </div>
        </form>
    </div>
</div>
